<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=<device-width>, initial-scale=1.0">
    <title>Registration Form</title>
    <link rel="stylesheet" href="regstyle.css">
</head>
<body>
    <div class="whole">
   <form class="background" >
    <h1>REGISTRATION FORM</h1>
    <p>Submit this form for online registration</p>
        <label for="txtName">Name:</label>
        <input type="text" id="txtName" required placeholder="  Enter Your Name" class="rounded">
        
        <label for="txtEmail">Email:</label>
        <input type="email" id="txtEmail" required placeholder="  Enter Your Email" class="rounded">
        <div class="row">
            <div class="column">
        <label for="PhoneNo">PhoneNo:</label>
        <input type="text" id="PhoneNo" required placeholder="  Enter Your PhoneNo." class="rounded">
        </div>
        <div class="column">
        <label for="dtDOB">DOB</label>
        <input type="date" id="dtDOB" name="dtDOB">
        </div>
        </div>
        <div class="gender">
        <input type="radio" id="check-male" name="gender" checked>
        <label for="check-male">Male</label>
        <input type="radio" id="check-female" name="gender" checked>
        <label for="check-female">Female</label>
        <input type="radio" id="check-transgender" name="gender" checked>
        <label for="check-transgender">Transgender</label>
        <input type="radio" id="check-other" name="gender" checked>
        <label for="check-other">Prefer Not to Say</label>
        </div>
        <div class="address">
        <label >Address:</label>
        <input  type="text" placeholder="Enter street address">

        <input  type="text" placeholder="Enter street address line 2">
        </div>

        <div class="row">
            <div class="column">
                <label>Country</label>
                <select>
                    <option>Select Country</option>
                    <option>India</option>
                    <option>USA</option>
                    <option>Canada</option>
                </select>
            </div>

            <div class="column">
                <label>City</label>
                <input type="text" placeholder="Enter your city">
            </div>
        </div>

        <div class="row">
            <div class="column">
                <label>Region</label>
                <input type="text" placeholder="Enter your region">
            </div>

            <div class="column">
                <label>Postal Code</label>
                <input type="text" placeholder="Enter postal code">
            </div>
        </div>
       <button type="submit">Register</button>
    </form>
    </div>
</body>
</html>
