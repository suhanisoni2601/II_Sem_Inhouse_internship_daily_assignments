<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us</title>

<link href="bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#1e52df;
}

.heading{
    background:#16255c;
    color:white;
    text-align:center;
    padding:15px;
    font-size:35px;
    font-weight:bold;
}

.contact-box{
    background:white;
    box-shadow:0 5px 15px rgba(0,0,0,.15);
}

.info-box{
    padding:40px;
}

.info{
    border-bottom:1px solid #ddd;
    padding:30px 0;
    text-align:center;
}

.info:last-child{
    border-bottom:none;
}

.info i{
    font-size:45px;
    color:#16255c;
    margin-bottom:15px;
}

.info h3{
    font-weight:bold;
}

.form-box{
    padding:40px;
}

.btn-send{
    background:#16255c;
    color:white;
}

.btn-send:hover{
    background:#0d1b4d;
    color:white;
}

</style>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<div class="container my-5">

<div class="contact-box">

<div class="heading">
Get In Touch With Us Now!
</div>

<div class="row justify-content-center g-4">

<div class="col-md-6">

<div class="row g-4">

    <div class="col-md-6">
        <div class="info">
            <i class="fas fa-phone"></i>
            <h3>Phone Number</h3>
            <p>+91 9876543210</p>
        </div>
    </div>

    <div class="col-md-6">
        <div class="info">
            <i class="fas fa-envelope"></i>
            <h3>Email</h3>
            <p>info@industrialportal.com</p>
            <p>support@industrialportal.com</p>
        </div>
    </div>

    <div class="col-md-6">
        <div class="info">
            <i class="fas fa-location-dot"></i>
            <h3>Location</h3>
            <p>SKIT Jaipur, Rajasthan</p>
        </div>
    </div>

    <div class="col-md-6">
        <div class="info">
            <i class="fas fa-clock"></i>
            <h3>Working Hours</h3>
            <p>Monday - Saturday</p>
            <p>09:00 AM - 06:00 PM</p>
        </div>
    </div>

</div>

</div>


</div>

</div>

</div>

</body>
</html>
