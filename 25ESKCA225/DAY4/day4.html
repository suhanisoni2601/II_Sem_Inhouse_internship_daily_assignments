<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    height:100vh;
    margin:0;
    overflow:hidden;
}

img{
    width:100px;
    position:absolute;
    cursor:pointer;
}

#score{
    padding:15px;
    font-size:22px;
    font-weight:bold;
}

#gameOver{
    display:none;
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    font-size:60px;
    color:red;
    font-weight:bold;
}
</style>
</head>

<body class="bg-light text-dark">

<div id="score">
    Apple : <span id="apple">0</span>
    &nbsp;&nbsp;&nbsp;
    Banana : <span id="banana">0</span>
</div>

<div id="gameOver">
    GAME OVER
</div>

<img src="https://static.vecteezy.com/system/resources/thumbnails/041/153/128/small/ai-generated-front-view-wet-red-ripe-apple-on-black-background-fruit-with-water-drops-photo.jpg"
onclick="clickImage('apple',this)">

<img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRZgzGsT4iEWXzZyt6wzfyhiwgSDGIBjrSWrg&s"
onclick="clickImage('banana',this)">

<script>

let apple=0;
let banana=0;
let gameEnded=false;

//Random position initially
document.querySelectorAll("img").forEach(img=>{
    moveImage(img);
});

//Move image randomly
function moveImage(img){
    img.style.left=Math.random()*(window.innerWidth-120)+"px";
    img.style.top=Math.random()*(window.innerHeight-150)+"px";
}

//Click Function
function clickImage(type,img){

    if(gameEnded)
        return;

    if(type=="apple"){
        document.getElementById("apple").innerText=++apple;
    }
    else{
        document.getElementById("banana").innerText=++banana;
    }

    moveImage(img);
}

//Game ends after 30 seconds
setTimeout(endGame,30000);

function endGame(){

    gameEnded=true;

    document.querySelectorAll("img").forEach(img=>{
        img.style.display="none";
    });

    document.getElementById("gameOver").style.display="block";

    //Theme Change
    document.body.classList.toggle("bg-light");
    document.body.classList.toggle("text-dark");

    document.body.classList.toggle("bg-dark");
    document.body.classList.toggle("text-light");
}

</script>

</body>
</html>
