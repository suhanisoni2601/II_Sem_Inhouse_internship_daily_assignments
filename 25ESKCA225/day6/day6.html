<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Users API</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>

<body class="bg-light">
    <h1 style="text-align: center; color:black; font-weight: bolder; font-size: 40px;">PERSONAL DETAILS</h1>

<div class="container mt-5">
    <div class="row row-cols-5 g-3" id="container"></div>
</div>

<script>

fetch("https://jsonplaceholder.typicode.com/users")
.then(response => response.json())
.then(data => {

    let html = "";

    for(let i = 0; i < data.length; i++){

        html += `
        <div class="col">

            <div class="card shadow" style="min-height:450px; padding:15px;">

                <div class="card-body text-center">

                    <img src="https://i.pravatar.cc/150?img=${data[i].id}"
                         class="rounded-circle mb-3" width="150px" height="150px" alt="User Avatar">

                    <h4>${data[i].name}</h4>

                    <button class="btn btn-primary btn-sm mt-2 show-btn">
                        Show Details
                    </button>

                    <div class="details mt-3" style="display:none;">

                        <p><strong>ID:</strong> ${data[i].id}</p>

                        <p><strong>Username:</strong> ${data[i].username}</p>

                        <p><strong>Email:</strong> ${data[i].email}</p>

                        <p><strong>Phone:</strong> ${data[i].phone}</p>

                        <p><strong>Website:</strong> ${data[i].website}</p>

                        <p><strong>Company:</strong> ${data[i].company.name}</p>

                        <p><strong>City:</strong> ${data[i].address.city}</p>

                    </div>

                </div>

            </div>

        </div>
        `;
    }

    $("#container").html(html);

    $(".show-btn").click(function(){

        $(this).next(".details").slideToggle();

    });

})
.catch(error => console.error(error));

</script>

</body>
</html>
